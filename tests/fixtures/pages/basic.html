<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Selenium Tabs Fixture</title>
    <style>
      body {
        font-family: sans-serif;
        margin: 0;
      }

      header,
      main,
      footer {
        padding: 1rem;
      }

      .spacer {
        height: 1600px;
        background: linear-gradient(#fff, #e7f0ff);
      }
    </style>
  </head>
  <body>
    <header>
      <a id="brand-logo" href="/basic.html">Selenium Tabs</a>
      <nav aria-label="Primary">
        <a href="/basic.html#home">Home</a>
        <a href="/basic.html#docs">Docs</a>
        <a href="/basic.html#contact">Contact</a>
      </nav>
    </header>
    <main data-page="basic">
      <h1>Local Selenium Fixture</h1>
      <form>
        <input id="search-input" name="q" type="text" value="tabs">
        <button id="submit-button" type="submit">Search</button>
      </form>
      <section id="cards">
        <article class="card" data-card-id="one">
          <h2>First Card</h2>
          <a href="/basic.html#first">Read first</a>
        </article>
        <article class="card" data-card-id="two">
          <h2>Second Card</h2>
          <a href="/basic.html#second">Read second</a>
        </article>
      </section>
      <div class="spacer">Scroll target</div>
    </main>
    <footer>Fixture footer</footer>
  </body>
</html>
